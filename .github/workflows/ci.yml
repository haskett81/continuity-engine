name: CI

# Runs on every push and pull request to master (this repo's default branch).
# Catches a broken build before you ever tag a release. No secrets, no
# publishing — just a green/red light.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
